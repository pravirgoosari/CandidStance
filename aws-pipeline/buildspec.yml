version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REPOSITORY_URI
      - REPOSITORY_URI=$ECR_REPOSITORY_URI
      - IMAGE_TAG=latest
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_URI=$REPOSITORY_URI:$COMMIT_HASH
      - echo Repository URI: $REPOSITORY_URI
      - echo Image URI: $IMAGE_URI

  build:
    commands:
      - echo Build started on date
      - echo Building the Docker image...
      - docker buildx build --platform linux/amd64 -t $IMAGE_URI .
      - docker tag $IMAGE_URI $REPOSITORY_URI:$IMAGE_TAG
      - echo Build completed on `date`

  post_build:
    commands:
      - echo Build completed on date
      - echo Pushing the Docker image...
      - docker push $IMAGE_URI
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing image definitions file...
      - printf '{"ImageURI":"%s"}' $IMAGE_URI > imageDefinitions.json
      - echo Deploying to Kubernetes...
      - aws eks update-kubeconfig --name candidstance-cluster --region us-east-1
      - kubectl set image deployment/candidstance-app candidstance-app=$REPOSITORY_URI:$IMAGE_TAG -n candidstance
      - kubectl rollout status deployment/candidstance-app -n candidstance
      - echo Deployment completed on date

artifacts:
  files:
    - imageDefinitions.json
    - appspec.yml
    - taskdef.json
